<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>FireRL — Adaptive Firewall Intelligence</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #060d1a;
            --surface: #0d1829;
            --panel: #111f35;
            --border: #1a2d4a;
            --border2: #22405f;
            --accent: #00d4ff;
            --accent2: #0099cc;
            --green: #00e676;
            --red: #ff4444;
            --orange: #ff9800;
            --yellow: #ffeb3b;
            --purple: #b388ff;
            --text: #cde3f5;
            --dim: #5a7fa0;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 3px
        }

        /* ── layout ── */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: .5px
        }

        .logo-fire {
            color: #ff6b35
        }

        .logo-rl {
            color: var(--accent)
        }

        .logo-sub {
            font-size: 11px;
            color: var(--dim);
            letter-spacing: 2px
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid;
        }

        .status-pill.online {
            border-color: rgba(0, 230, 118, .4);
            color: var(--green);
            background: rgba(0, 230, 118, .06)
        }

        .status-pill.offline {
            border-color: rgba(255, 68, 68, .4);
            color: var(--red);
            background: rgba(255, 68, 68, .06)
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        /* ── nav ── */
        .nav {
            display: flex;
            gap: 2px;
            padding: 8px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .nav-btn {
            padding: 7px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            background: transparent;
            color: var(--dim);
            transition: all .15s;
        }

        .nav-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .04)
        }

        .nav-btn.active {
            color: var(--accent);
            background: rgba(0, 212, 255, .08)
        }

        /* ── main content ── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        /* ── cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .card-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 7px
        }

        .card-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%
        }

        .card-body {
            padding: 16px
        }

        /* ── grid ── */
        .g2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px
        }

        .g3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px
        }

        .g4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px
        }

        .g5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px
        }

        /* ── KPI card ── */
        .kpi {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .kpi-label {
            font-size: 11px;
            color: var(--dim);
            letter-spacing: 1.5px;
            text-transform: uppercase
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            line-height: 1
        }

        .kpi-sub {
            font-size: 11px;
            color: var(--dim);
            margin-top: 2px
        }

        .kpi-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px
        }

        .kpi-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .6s ease
        }

        /* ── table ── */
        .tbl-wrap {
            overflow-x: auto;
            max-height: 380px;
            overflow-y: auto
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: var(--panel);
            padding: 8px 12px;
            text-align: left;
            color: var(--dim);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            letter-spacing: 1px;
            white-space: nowrap;
            font-weight: 600;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            transition: background .1s
        }

        tbody tr:hover {
            background: rgba(0, 212, 255, .03)
        }

        tbody td {
            padding: 7px 12px;
            white-space: nowrap;
            font-family: var(--mono);
            font-size: 11px
        }

        /* ── badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid;
        }

        .b-allow {
            background: rgba(0, 230, 118, .1);
            color: var(--green);
            border-color: rgba(0, 230, 118, .25)
        }

        .b-block {
            background: rgba(255, 68, 68, .1);
            color: var(--red);
            border-color: rgba(255, 68, 68, .25)
        }

        .b-block-perm {
            background: rgba(255, 68, 68, .18);
            color: #ff6b6b;
            border-color: rgba(255, 68, 68, .4)
        }

        .b-dos {
            background: rgba(255, 68, 68, .15);
            color: #ff5252;
            border-color: rgba(255, 68, 68, .3)
        }

        .b-scan {
            background: rgba(255, 152, 0, .12);
            color: var(--orange);
            border-color: rgba(255, 152, 0, .25)
        }

        .b-brute {
            background: rgba(255, 100, 100, .12);
            color: #ff7043;
            border-color: rgba(255, 100, 100, .25)
        }

        .b-suspicious {
            background: rgba(255, 235, 59, .1);
            color: var(--yellow);
            border-color: rgba(255, 235, 59, .2)
        }

        .b-normal {
            background: rgba(0, 212, 255, .08);
            color: var(--accent);
            border-color: rgba(0, 212, 255, .2)
        }

        /* ── threat bar ── */
        .tbar-wrap {
            width: 72px;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            display: inline-block;
            vertical-align: middle
        }

        .tbar {
            height: 100%;
            border-radius: 3px;
            transition: width .3s
        }

        /* ── toggle ── */
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .toggle {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            flex-shrink: 0
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #1a2d4a;
            border-radius: 24px;
            cursor: pointer;
            transition: background .2s;
            border: 1px solid var(--border2);
        }

        .slider::before {
            content: '';
            position: absolute;
            height: 16px;
            width: 16px;
            left: 4px;
            top: 3px;
            background: var(--dim);
            border-radius: 50%;
            transition: transform .2s, background .2s;
        }

        input:checked+.slider {
            background: rgba(0, 230, 118, .2);
            border-color: rgba(0, 230, 118, .4)
        }

        input:checked+.slider::before {
            transform: translateX(20px);
            background: var(--green)
        }

        /* ── buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            border-radius: 6px;
            border: 1px solid;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-red {
            background: rgba(255, 68, 68, .1);
            border-color: rgba(255, 68, 68, .35);
            color: var(--red)
        }

        .btn-red:hover {
            background: rgba(255, 68, 68, .18)
        }

        .btn-green {
            background: rgba(0, 230, 118, .1);
            border-color: rgba(0, 230, 118, .35);
            color: var(--green)
        }

        .btn-green:hover {
            background: rgba(0, 230, 118, .18)
        }

        .btn-blue {
            background: rgba(0, 212, 255, .1);
            border-color: rgba(0, 212, 255, .35);
            color: var(--accent)
        }

        .btn-blue:hover {
            background: rgba(0, 212, 255, .18)
        }

        .btn-ghost {
            background: transparent;
            border-color: var(--border2);
            color: var(--dim)
        }

        .btn-ghost:hover {
            border-color: var(--text);
            color: var(--text)
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 11px
        }

        /* ── input ── */
        .inp {
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 7px 11px;
            color: var(--text);
            font-family: var(--sans);
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }

        .inp:focus {
            border-color: var(--accent)
        }

        /* ── Q-table heatmap ── */
        .qt-grid {
            display: grid;
            grid-template-columns: auto repeat(3, 1fr);
            gap: 3px;
            font-size: 11px
        }

        .qt-h {
            color: var(--dim);
            padding: 4px 6px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 1px
        }

        .qt-label {
            color: var(--dim);
            padding: 4px 8px;
            font-size: 10px;
            display: flex;
            align-items: center;
            font-family: var(--mono)
        }

        .qt-cell {
            padding: 5px 4px;
            border-radius: 4px;
            text-align: center;
            font-weight: 700;
            font-family: var(--mono);
            font-size: 11px;
            transition: background .4s;
        }

        /* ── blocked IP card ── */
        .blocked-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            background: rgba(255, 68, 68, .06);
            border: 1px solid rgba(255, 68, 68, .15);
        }

        .blocked-ip {
            font-family: var(--mono);
            font-weight: 600;
            color: var(--red);
            font-size: 12px
        }

        .blocked-meta {
            font-size: 11px;
            color: var(--dim);
            margin-top: 2px
        }

        /* ── chart ── */
        .chart-box {
            position: relative;
            height: 200px
        }

        /* ── rule adaptation ── */
        .adapt-item {
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            background: rgba(0, 212, 255, .04);
            border: 1px solid rgba(0, 212, 255, .12);
            font-family: var(--mono);
            font-size: 11px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .adapt-val {
            padding: 1px 6px;
            border-radius: 3px;
            background: rgba(0, 212, 255, .1);
            color: var(--accent)
        }

        .adapt-up {
            color: var(--green)
        }

        .adapt-down {
            color: var(--red)
        }

        /* ── error banner ── */
        .error {
            background: rgba(255, 68, 68, .1);
            border: 1px solid rgba(255, 68, 68, .25);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--red);
            font-size: 13px;
        }

        /* ── model stat ── */
        .mstat {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px
        }

        .mstat-k {
            font-size: 10px;
            color: var(--dim);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 4px
        }

        .mstat-v {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            font-family: var(--mono)
        }

        /* ── confusion matrix ── */
        .cm-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px
        }

        .cm-cell {
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            border: 1px solid
        }

        .cm-val {
            font-size: 26px;
            font-weight: 700;
            font-family: var(--mono)
        }

        .cm-lbl {
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px
        }

        /* ── misc ── */
        .empty {
            color: var(--dim);
            font-size: 12px;
            padding: 24px;
            text-align: center
        }

        .mono {
            font-family: var(--mono)
        }

        .tag {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px
        }

        .tag-live {
            background: rgba(0, 230, 118, .15);
            color: var(--green);
            border: 1px solid rgba(0, 230, 118, .3)
        }

        @media(max-width:900px) {
            .g4 {
                grid-template-columns: 1fr 1fr
            }

            .g5 {
                grid-template-columns: 1fr 1fr
            }

            .g2 {
                grid-template-columns: 1fr
            }

            .g3 {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const API = "http://localhost:5000/api";
        const POLL = 2500;

        async function api(path, opts = {}) {
            const r = await fetch(API + path, { headers: { "Content-Type": "application/json" }, ...opts });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
        }

        /* ── colour helpers ── */
        function tc(s) { return s >= .65 ? "#ff4444" : s >= .3 ? "#ff9800" : "#00e676" }
        function ac(a) {
            if (a === "BLOCK_PERM") return "b-block-perm";
            if (a === "BLOCK_TEMP" || a === "BLOCK") return "b-block";
            return "b-allow";
        }
        function atkBadge(t) {
            const m = { dos: "b-dos", port_scan: "b-scan", brute_force: "b-brute", suspicious: "b-suspicious", normal: "b-normal" };
            const l = { dos: "DoS", port_scan: "Port Scan", brute_force: "Brute Force", suspicious: "Suspicious", normal: "Normal" };
            return <span className={`badge ${m[t] || "b-normal"}`}>{l[t] || t || "—"}</span>;
        }

        /* ── Sparkline ── */
        function Spark({ data, color, h = 32, w = 100 }) {
            const ref = useRef();
            useEffect(() => {
                const c = ref.current; if (!c) return;
                const ctx = c.getContext("2d");
                ctx.clearRect(0, 0, w, h);
                if (!data || data.length < 2) return;
                const mn = Math.min(...data), mx = Math.max(...data), rng = mx - mn || 1;
                ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.lineJoin = "round";
                ctx.beginPath();
                data.forEach((v, i) => {
                    const x = (i / (data.length - 1)) * w, y = h - ((v - mn) / rng) * (h - 4) - 2;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                });
                ctx.stroke();
            }, [data, color, h, w]);
            return <canvas ref={ref} width={w} height={h} style={{ display: "inline-block", verticalAlign: "middle" }} />;
        }

        /* ── Traffic Chart (bar) ── */
        function TrafficChart({ packets }) {
            const ref = useRef(); const chartRef = useRef();
            useEffect(() => {
                const ctx = ref.current?.getContext("2d"); if (!ctx) return;
                const SLOTS = 20, now = Date.now() / 1000;
                const allow = new Array(SLOTS).fill(0), block = new Array(SLOTS).fill(0);
                const labels = [];
                for (let i = SLOTS - 1; i >= 0; i--)labels.push(i % 4 === 0 ? `-${i * 2}s` : "");
                packets.forEach(p => {
                    const age = now - new Date(p.timestamp).getTime() / 1000;
                    const slot = Math.floor(age / 2);
                    if (slot >= 0 && slot < SLOTS) {
                        const idx = SLOTS - 1 - slot;
                        if (p.action === "ALLOW") allow[idx]++; else block[idx]++;
                    }
                });
                if (chartRef.current) {
                    chartRef.current.data.labels = labels;
                    chartRef.current.data.datasets[0].data = allow;
                    chartRef.current.data.datasets[1].data = block;
                    chartRef.current.update("none"); return;
                }
                chartRef.current = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels, datasets: [
                            { label: "Allow", data: allow, backgroundColor: "rgba(0,230,118,.5)", borderRadius: 2, stack: "s" },
                            { label: "Block", data: block, backgroundColor: "rgba(255,68,68,.5)", borderRadius: 2, stack: "s" },
                        ]
                    },
                    options: {
                        animation: false, responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { labels: { color: "#5a7fa0", font: { size: 11 } } } },
                        scales: {
                            x: { ticks: { color: "#5a7fa0", font: { size: 10 } }, grid: { color: "rgba(255,255,255,.03)" }, stacked: true },
                            y: { ticks: { color: "#5a7fa0", font: { size: 10 } }, grid: { color: "rgba(255,255,255,.03)" }, stacked: true, beginAtZero: true },
                        },
                    },
                });
            }, [packets]);
            return <div className="chart-box"><canvas ref={ref} /></div>;
        }

        /* ── Threat Distribution Pie ── */
        function ThreatPie({ packets }) {
            const ref = useRef(); const chartRef = useRef();
            useEffect(() => {
                const ctx = ref.current?.getContext("2d"); if (!ctx) return;
                const counts = { normal: 0, suspicious: 0, dos: 0, port_scan: 0, brute_force: 0 };
                packets.forEach(p => { if (counts[p.attack_type] !== undefined) counts[p.attack_type]++; });
                const labels = ["Normal", "Suspicious", "DoS", "Port Scan", "Brute Force"];
                const data = Object.values(counts);
                const colors = ["rgba(0,212,255,.7)", "rgba(255,235,59,.7)", "rgba(255,68,68,.7)", "rgba(255,152,0,.7)", "rgba(255,100,100,.7)"];
                if (chartRef.current) {
                    chartRef.current.data.datasets[0].data = data;
                    chartRef.current.update("none"); return;
                }
                chartRef.current = new Chart(ctx, {
                    type: "doughnut",
                    data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: "rgba(0,0,0,.3)", borderWidth: 2, hoverOffset: 6 }] },
                    options: {
                        animation: false, responsive: true, maintainAspectRatio: false, cutout: "62%",
                        plugins: { legend: { position: "bottom", labels: { color: "#5a7fa0", font: { size: 11 }, boxWidth: 10, padding: 10 } } },
                    },
                });
            }, [packets]);
            return <div className="chart-box"><canvas ref={ref} /></div>;
        }

        /* ── Q-Table Heatmap ── */
        function QTable({ sample }) {
            if (!sample || !sample.length) return <div className="empty">No Q-table data.</div>;
            const actions = ["ALLOW", "BLOCK_T", "BLOCK_P"];
            const threatL = ["Normal", "Suspicious", "Attack"];
            const rateL = ["Low Rate", "Med Rate", "Hi Rate"];
            const rows = [];
            for (let t = 0; t < 3; t++)for (let r = 0; r < 3; r++) {
                const vals = sample[t][r];
                rows.push({ label: `${threatL[t]} / ${rateL[r]}`, vals });
            }
            const all = rows.flatMap(r => r.vals);
            const mn = Math.min(...all), mx = Math.max(...all), rng = mx - mn || 1;
            function cellBg(v, ai) {
                const n = (v - mn) / rng;
                if (ai === 0) return `rgba(0,230,118,${.08 + n * .45})`;
                if (ai === 1) return `rgba(255,68,68,${.08 + n * .45})`;
                return `rgba(179,136,255,${.08 + n * .45})`;
            }
            return (
                <div style={{ overflowX: "auto" }}>
                    <div className="qt-grid">
                        <div className="qt-h" />
                        {actions.map(a => <div key={a} className="qt-h">{a}</div>)}
                        {rows.map((row, i) => (
                            <React.Fragment key={i}>
                                <div className="qt-label">{row.label}</div>
                                {(row.vals || []).map((v, ai) => (
                                    <div key={ai} className="qt-cell" style={{ background: cellBg(v, ai), color: "#cde3f5" }}>
                                        {typeof v === "number" ? v.toFixed(2) : "—"}
                                    </div>
                                ))}
                            </React.Fragment>
                        ))}
                    </div>
                </div>
            );
        }

        /* ── Rule Adaptation History ── */
        function RuleHistory({ history }) {
            if (!history || !history.length) return <div className="empty">No threshold adaptations yet. Agent is learning…</div>;
            return (
                <div style={{ maxHeight: 280, overflowY: "auto" }}>
                    {[...history].reverse().map((h, i) => (
                        <div key={i} className="adapt-item">
                            <span style={{ color: "var(--dim)" }}>Step {h.step || "—"}</span>
                            <span>DoS PPS: <span className="adapt-val">{h.dos_pps}</span></span>
                            <span>Scan Ports: <span className="adapt-val">{h.scan_ports}</span></span>
                            <span>Brute: <span className="adapt-val">{h.brute_failed}</span></span>
                            <span>FP: <span style={{ color: h.fp_rate > .15 ? "var(--red)" : "var(--green)" }}>{((h.fp_rate || 0) * 100).toFixed(1)}%</span></span>
                            <span>FN: <span style={{ color: h.fn_rate > .20 ? "var(--red)" : "var(--green)" }}>{((h.fn_rate || 0) * 100).toFixed(1)}%</span></span>
                        </div>
                    ))}
                </div>
            );
        }

        /* ══════════════════════════════════════════════════════
           PAGES
        ══════════════════════════════════════════════════════ */

        /* ── Dashboard ── */
        function PageDashboard({ traffic, blocked, agent, onUnblock }) {
            const pkts = traffic.packets || [];
            const total = pkts.length;
            const blkCnt = blocked.length;
            const atkPkts = pkts.filter(p => p.attack_type !== "normal").length;
            const avgT = total ? (pkts.reduce((s, p) => s + p.threat_score, 0) / total).toFixed(3) : "0.000";
            const allowCnt = pkts.filter(p => p.action === "ALLOW").length;
            const blockCnt = pkts.filter(p => p.action !== "ALLOW").length;
            const stats = agent?.agent || {};

            const rewardHist = useMemo(() => {
                return pkts.slice(-40).map(p => p.reward || 0);
            }, [pkts]);

            return (
                <>
                    {/* KPI row */}
                    <div className="g5">
                        {[
                            { l: "Packets Captured", v: total, c: "var(--accent)", sub: "in buffer", bar: null },
                            { l: "IPs Blocked", v: blkCnt, c: "var(--red)", sub: "currently active", bar: null },
                            { l: "Threats Detected", v: atkPkts, c: "var(--orange)", sub: `${total ? ((atkPkts / total) * 100).toFixed(1) : 0}% of traffic`, bar: atkPkts / Math.max(total, 1) },
                            { l: "Avg Threat Score", v: avgT, c: parseFloat(avgT) >= .5 ? "var(--red)" : "var(--green)", sub: "0–1 scale", bar: parseFloat(avgT) },
                            { l: "RL Accuracy", v: stats.accuracy != null ? (stats.accuracy * 100).toFixed(1) + "%" : "—", c: "var(--purple)", sub: `${stats.total_decisions || 0} decisions`, bar: stats.accuracy || 0 },
                        ].map(k => (
                            <div key={k.l} className="kpi">
                                <div className="kpi-label">{k.l}</div>
                                <div className="kpi-value" style={{ color: k.c, fontSize: 26 }}>{k.v}</div>
                                <div className="kpi-sub">{k.sub}</div>
                                {k.bar != null && <div className="kpi-bar"><div className="kpi-fill" style={{ width: (k.bar * 100) + "%", background: k.c }} /></div>}
                            </div>
                        ))}
                    </div>

                    <div className="g2">
                        <div className="card">
                            <div className="card-head">
                                <div className="card-title"><div className="card-dot" style={{ background: "var(--green)" }} />Traffic Flow</div>
                                <div style={{ display: "flex", gap: 14, fontSize: 12 }}>
                                    <span style={{ color: "var(--green)" }}>✓ Allow: {allowCnt}</span>
                                    <span style={{ color: "var(--red)" }}>✗ Block: {blockCnt}</span>
                                </div>
                            </div>
                            <div className="card-body"><TrafficChart packets={pkts} /></div>
                        </div>
                        <div className="card">
                            <div className="card-head"><div className="card-title"><div className="card-dot" style={{ background: "var(--orange)" }} />Attack Distribution</div></div>
                            <div className="card-body"><ThreatPie packets={pkts} /></div>
                        </div>
                    </div>

                    <div className="g2">
                        <div className="card">
                            <div className="card-head">
                                <div className="card-title"><div className="card-dot" style={{ background: "var(--red)" }} />Blocked IPs <span style={{ color: "var(--red)", marginLeft: 4 }}>{blkCnt}</span></div>
                            </div>
                            <div className="card-body">
                                {blocked.length === 0
                                    ? <div className="empty">No IPs currently blocked.</div>
                                    : <div style={{ maxHeight: 240, overflowY: "auto" }}>
                                        {blocked.map(b => (
                                            <div key={b.ip} className="blocked-item">
                                                <div>
                                                    <div className="blocked-ip">{b.ip}</div>
                                                    <div className="blocked-meta">
                                                        Blocked {b.blocked_at ? new Date(b.blocked_at).toLocaleTimeString() : "—"}
                                                        {b.seconds_remaining != null && ` · expires in ${Math.round(b.seconds_remaining)}s`}
                                                        {b.seconds_remaining == null && " · permanent"}
                                                    </div>
                                                </div>
                                                <button className="btn btn-ghost btn-sm" onClick={() => onUnblock(b.ip)}>Unblock</button>
                                            </div>
                                        ))}
                                    </div>
                                }
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-head">
                                <div className="card-title"><div className="card-dot" style={{ background: "var(--purple)" }} />Reward Signal</div>
                                <span style={{ fontSize: 11, color: "var(--dim)", fontFamily: "var(--mono)" }}>last 40 packets</span>
                            </div>
                            <div className="card-body" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                    <Spark data={rewardHist} color="var(--accent)" w={200} h={48} />
                                    <div style={{ fontSize: 12, color: "var(--dim)" }}>
                                        <div>Avg reward (last 100):</div>
                                        <div style={{ fontSize: 18, fontWeight: 700, color: stats.avg_reward_last_100 > 0 ? "var(--green)" : "var(--red)", fontFamily: "var(--mono)" }}>
                                            {stats.avg_reward_last_100 != null ? stats.avg_reward_last_100.toFixed(3) : "—"}
                                        </div>
                                    </div>
                                </div>
                                <div className="g2" style={{ gap: 8 }}>
                                    {[
                                        { k: "ε (Epsilon)", v: stats.epsilon?.toFixed(4) },
                                        { k: "Total Steps", v: stats.total_decisions },
                                        { k: "TP Blocks", v: stats.tp, c: "var(--green)" },
                                        { k: "FP Blocks", v: stats.fp, c: "var(--red)" },
                                        { k: "TN Allows", v: stats.tn, c: "var(--green)" },
                                        { k: "FN Allows", v: stats.fn, c: "var(--red)" },

                                        <div key={x.k} className="mstat">
                                            <div className="mstat-k">{x.k}</div>
                                            <div className="mstat-v" style={x.c ? { color: x.c } : {}}>{x.v ?? ""}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        /* ── Live Traffic ── */
        function PageTraffic({ packets }) {
            return (
                <div className="card">
                    <div className="card-head">
                        <div className="card-title"><div className="card-dot" style={{ background: "var(--accent)" }} />Live Traffic Feed <span className="tag tag-live" style={{ marginLeft: 8 }}>LIVE</span></div>
                        <span style={{ fontSize: 11, color: "var(--dim)" }}>{packets.length} packets in buffer</span>
                    </div>
                    <div className="card-body" style={{ padding: 0 }}>
                        {packets.length === 0
                            ? <div className="empty">Waiting for traffic…</div>
                            : <div className="tbl-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            {["Time", "Source IP", "Dest IP", "Proto", "Port", "Size", "Attack", "Threat", "Action", "Reward"].map(h => <th key={h}>{h}</th>)}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {[...packets].reverse().slice(0, 200).map((p, i) => (
                                            <tr key={i}>
                                                <td style={{ color: "var(--dim)" }}>{p.timestamp ? new Date(p.timestamp).toLocaleTimeString() : "—"}</td>
                                                <td style={{ color: "var(--accent)" }}>{p.src_ip}</td>
                                                <td style={{ color: "var(--dim)" }}>{p.dst_ip || "—"}</td>
                                                <td><span className="badge b-normal" style={{ fontSize: 10 }}>{p.protocol}</span></td>
                                                <td>{p.dst_port || "—"}</td>
                                                <td>{p.size}B</td>
                                                <td>{atkBadge(p.attack_type)}</td>
                                                <td>
                                                    <div className="tbar-wrap"><div className="tbar" style={{ width: (p.threat_score * 100) + "%", background: tc(p.threat_score) }} /></div>
                                                    <span style={{ marginLeft: 6, color: tc(p.threat_score), fontSize: 10 }}>{((p.threat_score || 0) * 100).toFixed(0)}%</span>
                                                </td>
                                                <td><span className={`badge ${ac(p.action)}`}>{p.action}</span></td>

                                    </tbody>
                                </table>
                            </div>
                        }
                    </div>
                </div>
            );
        }

        /* ── RL Agent ── */
        function PageAgent({ agent: agentData, ruleHistory, onReset }) {
            const stats = agentData?.agent || {};
            const thresholds = stats.dynamic_thresholds || {};
            const history = ruleHistory?.rule_history || [];
            const cm = [
                { l: "True Positive", v: stats.tp, c: "var(--green)", b: "rgba(0,230,118,.08)", bc: "rgba(0,230,118,.25)" },
                { l: "True Negative", v: stats.tn, c: "var(--accent)", b: "rgba(0,212,255,.08)", bc: "rgba(0,212,255,.25)" },
                { l: "False Positive", v: stats.fp, c: "var(--orange)", b: "rgba(255,152,0,.08)", bc: "rgba(255,152,0,.25)" },
                { l: "False Negative", v: stats.fn, c: "var(--red)", b: "rgba(255,68,68,.08)", bc: "rgba(255,68,68,.25)" },
            ];
            return (
                <>
                    <div className="g2">
                        <div className="card">
                            <div className="card-head">
                                <div className="card-title"><div className="card-dot" style={{ background: "var(--purple)" }} />Agent Performance</div>
                                <button className="btn btn-ghost btn-sm" onClick={onReset}>Reset Q-Table</button>
                            </div>
                            <div className="card-body">
                                <div className="g3" style={{ gap: 10, marginBottom: 14 }}>
                                    {[
                                        { k: "Accuracy", v: stats.accuracy != null ? (stats.accuracy * 100).toFixed(1) + "%" : "—" },
                                        { k: "FP Rate", v: stats.fp_rate != null ? (stats.fp_rate * 100).toFixed(1) + "%" : "—", c: stats.fp_rate > .2 ? "var(--red)" : "var(--green)" },
                                        { k: "FN Rate", v: stats.fn_rate != null ? (stats.fn_rate * 100).toFixed(1) + "%" : "—", c: stats.fn_rate > .2 ? "var(--red)" : "var(--green)" },
                                        { k: "Epsilon ε", v: stats.epsilon?.toFixed(4) || "—" },
                                        { k: "Avg Reward", v: stats.avg_reward_last_100?.toFixed(3) || "—", c: stats.avg_reward_last_100 > 0 ? "var(--green)" : "var(--red)" },
                                        { k: "Decisions", v: stats.total_decisions || 0 },
                                    ].map(x => (
                                        <div key={x.k} className="mstat">
                                            <div className="mstat-k">{x.k}</div>
                                            <div className="mstat-v" style={x.c ? { color: x.c } : {}}>{x.v}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="cm-grid">
                                    {cm.map(c => (
                                        <div key={c.l} className="cm-cell" style={{ background: c.b, borderColor: c.bc }}>
                                            <div className="cm-val" style={{ color: c.c }}>{c.v || 0}</div>
                                            <div className="cm-lbl" style={{ color: c.c }}>{c.l}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-head">
                                <div className="card-title"><div className="card-dot" style={{ background: "var(--accent)" }} />Q-Table Heatmap <span style={{ color: "var(--dim)", fontSize: 10, marginLeft: 4 }}>3×3×3 slice</span></div>
                            </div>
                            <div className="card-body" style={{ maxHeight: 340, overflowY: "auto" }}>
                                <QTable sample={stats.q_table_sample} />
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-head">
                            <div className="card-title"><div className="card-dot" style={{ background: "var(--yellow)" }} />Dynamic Rule Adaptation History</div>
                            <span style={{ fontSize: 11, color: "var(--dim)" }}>Thresholds auto-tuned every 200 decisions</span>
                        </div>
                        <div className="card-body">
                            <div style={{ display: "flex", gap: 20, marginBottom: 12, flexWrap: "wrap" }}>
                                {[
                                    { l: "DoS PPS Threshold", v: thresholds.dos_pps, unit: "pkt/s" },
                                    { l: "Port Scan Threshold", v: thresholds.scan_ports, unit: "ports" },
                                    { l: "Brute Force Threshold", v: thresholds.brute_failed, unit: "fails" },
                                ].map(t => (
                                    <div key={t.l} style={{ background: "var(--panel)", border: "1px solid var(--border)", borderRadius: 6, padding: "8px 14px", minWidth: 160 }}>
                                        <div style={{ fontSize: 10, color: "var(--dim)", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>{t.l}</div>
                                        <div style={{ fontSize: 20, fontWeight: 700, color: "var(--accent)", fontFamily: "var(--mono)" }}>{t.v || "—"} <span style={{ fontSize: 11, color: "var(--dim)" }}>{t.unit}</span></div>
                                    </div>
                                ))}
                            </div>
                            <RuleHistory history={history} />
                        </div>
                    </div>
                </>
            );
        }

        /* ── Manual Control ── */
        function PageControl({ onRefresh, rlMode, onRlToggle }) {
            const [ip, setIp] = useState("");
            const [dur, setDur] = useState("300");
            const [msg, setMsg] = useState(null);
            const [loading, setLoading] = useState(false);

            async function submit(action) {
                if (!ip.trim()) return;
                setLoading(true);
                try {
                    const body = { ip: ip.trim(), action, duration: parseInt(dur) || 300 };
                    await api("/decision", { method: "POST", body: JSON.stringify(body) });
                    setMsg({ ok: true, text: `${action} applied to ${ip.trim()}` });
                    onRefresh();
                } catch (e) { setMsg({ ok: false, text: e.message }); }
                setLoading(false);
                setTimeout(() => setMsg(null), 3000);
            }

            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                    <div className="card">
                        <div className="card-head"><div className="card-title"><div className="card-dot" style={{ background: "var(--green)" }} />RL Auto-Mode</div></div>
                        <div className="card-body">
                            <div className="toggle-row">
                                <label className="toggle">
                                    <input type="checkbox" checked={rlMode} onChange={e => onRlToggle(e.target.checked)} />
                                    <span className="slider" />
                                </label>
                                <div>
                                    <div style={{ fontWeight: 600, fontSize: 13 }}>{rlMode ? "RL Auto-Mode: Active" : "Manual Mode: RL Paused"}</div>
                                    <div style={{ fontSize: 12, color: "var(--dim)", marginTop: 2 }}>{rlMode ? "Agent automatically classifies and blocks threats in real time." : "Override manually below. Agent will not make decisions."}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <div className="card-head"><div className="card-title"><div className="card-dot" style={{ background: "var(--red)" }} />Manual IP Override</div></div>
                        <div className="card-body">
                            {msg && <div style={{ marginBottom: 10, fontSize: 13, color: msg.ok ? "var(--green)" : "var(--red)" }}>{msg.text}</div>}
                            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
                                <input className="inp" placeholder="IP address (e.g. 192.168.1.100)" value={ip} onChange={e => setIp(e.target.value)} style={{ flex: 1, minWidth: 200 }} />
                                <input className="inp" placeholder="Block duration (s)" value={dur} onChange={e => setDur(e.target.value)} style={{ width: 160 }} />
                            </div>
                            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                <button className="btn btn-red" disabled={loading} onClick={() => submit("BLOCK_TEMP")}>Block Temp</button>
                                <button className="btn btn-red" disabled={loading} style={{ borderColor: "rgba(255,68,68,.6)" }} onClick={() => submit("BLOCK_PERM")}>Block Permanent</button>
                                <button className="btn btn-green" disabled={loading} onClick={() => submit("ALLOW")}>Unblock / Allow</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ── Decision Log ── */
        function PageLogs({ logs }) {
            return (
                <div className="card">
                    <div className="card-head">
                        <div className="card-title"><div className="card-dot" style={{ background: "var(--dim)" }} />Decision Log (MongoDB)</div>
                        <span style={{ fontSize: 11, color: "var(--dim)" }}>{logs.length} records</span>
                    </div>
                    <div className="card-body" style={{ padding: 0 }}>
                        {logs.length === 0
                            ? <div className="empty">No decisions logged yet.</div>
                            : <div className="tbl-wrap">
                                <table>
                                    <thead>
                                        <tr>{["Time", "Source IP", "Attack Type", "Threat", "Action", "Reward", "State"].map(h => <th key={h}>{h}</th>)}</tr>
                                    </thead>
                                    <tbody>
                                        {logs.map((l, i) => (
                                            <tr key={i}>
                                                <td style={{ color: "var(--dim)" }}>{l.timestamp ? new Date(l.timestamp).toLocaleTimeString() : "—"}</td>
                                                <td style={{ color: "var(--accent)" }}>{l.src_ip}</td>
                                                <td>{atkBadge(l.attack_type)}</td>
                                                <td><span style={{ color: tc(l.threat_score) }}>{((l.threat_score || 0) * 100).toFixed(0)}%</span></td>
                                                <td><span className={`badge ${ac(l.action)}`}>{l.action}</span></td>
                                                <td style={{ color: l.reward > 0 ? "var(--green)" : "var(--red)", fontWeight: 600 }}>{(l.reward || 0).toFixed(2)}</td>
                                                <td style={{ color: "var(--dim)" }}>[{(l.state || []).join(",")}]</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        }
                    </div>
                </div>
            );
        }

        /* ══════════════════════════════════════════════════════
           ROOT APP
        ══════════════════════════════════════════════════════ */
        function App() {
            const [page, setPage] = useState("dashboard");
            const [traffic, setTraffic] = useState({ packets: [], rl_mode: true });
            const [blocked, setBlocked] = useState([]);
            const [agentData, setAgentData] = useState(null);
            const [logs, setLogs] = useState([]);
            const [ruleHistory, setRuleHistory] = useState({});
            const [rlMode, setRlMode] = useState(true);
            const [error, setError] = useState(null);
            const [connected, setConnected] = useState(false);
            const [lastPoll, setLastPoll] = useState(null);

            const fetchAll = useCallback(async () => {
                try {
                    const [t, b, m, l, rh] = await Promise.all([
                        api("/traffic?n=200"),
                        api("/blocked"),
                        api("/model"),
                        api("/logs?n=200"),
                        api("/rule-history"),
                    ]);
                    setTraffic(t);
                    setBlocked(b.blocked || []);
                    setAgentData(m);
                    setLogs(l.logs || []);
                    setRuleHistory(rh);
                    setRlMode(t.rl_mode);
                    setError(null); setConnected(true); setLastPoll(new Date());
                } catch (e) {
                    setError("Cannot reach backend at " + API + ". Start app.py first.");
                    setConnected(false);
                }
            }, []);

            useEffect(() => { fetchAll(); const id = setInterval(fetchAll, POLL); return () => clearInterval(id); }, [fetchAll]);

            async function toggleRL(v) {
                try { await api("/rl-mode", { method: "POST", body: JSON.stringify({ active: v }) }); setRlMode(v); } catch (e) { }
            }
            async function handleUnblock(ip) {
                try { await api("/unblock", { method: "POST", body: JSON.stringify({ ip }) }); fetchAll(); } catch (e) { }
            }
            async function handleReset() {
                if (!confirm("Reset Q-table to zero? The agent will re-learn from scratch.")) return;
                try { await api("/reset-agent", { method: "POST", body: "{}" }); fetchAll(); } catch (e) { }
            }

            const TABS = [
                { id: "dashboard", label: "Dashboard" },
                { id: "traffic", label: "Live Traffic" },
                { id: "agent", label: "RL Agent" },
                { id: "logs", label: "Decision Log" },
                { id: "control", label: "Control" },
            ];

            return (
                <div className="app">
                    <div className="topbar">
                        <div className="logo">
                            <div className="logo-text">
                                <span className="logo-fire">Fire</span><span className="logo-rl">RL</span>
                            </div>
                            <div className="logo-sub">ADAPTIVE FIREWALL INTELLIGENCE</div>
                        </div>
                        <div className="topbar-right">
                            {agentData && (
                                <div style={{ fontSize: 12, color: "var(--dim)", display: "flex", gap: 12 }}>
                                    <span>ε: <span style={{ color: "var(--accent)", fontFamily: "var(--mono)" }}>{agentData.agent?.epsilon?.toFixed(3) || "—"}</span></span>
                                    <span>Steps: <span style={{ color: "var(--accent)", fontFamily: "var(--mono)" }}>{agentData.agent?.total_decisions || 0}</span></span>
                                    <span>Acc: <span style={{ color: "var(--green)", fontFamily: "var(--mono)" }}>{agentData.agent?.accuracy != null ? (agentData.agent.accuracy * 100).toFixed(1) + "%" : "—"}</span></span>
                                </div>
                            )}
                            <div className={`status-pill ${connected ? "online" : "offline"}`}>
                                <div className="dot" />
                                {connected ? "Connected" : "Offline"}
                                {lastPoll && connected && <span style={{ marginLeft: 6, opacity: .7 }}>{lastPoll.toLocaleTimeString()}</span>}
                            </div>
                            <label className="toggle" style={{ width: 40, height: 22 }}>
                                <input type="checkbox" checked={rlMode} onChange={e => toggleRL(e.target.checked)} />
                                <span className="slider" />
                            </label>
                            <span style={{ fontSize: 12, color: rlMode ? "var(--green)" : "var(--dim)" }}>{rlMode ? "RL ON" : "RL OFF"}</span>
                        </div>
                    </div>

                    <div className="nav">
                        {TABS.map(t => (
                            <button key={t.id} className={`nav-btn${page === t.id ? " active" : ""}`} onClick={() => setPage(t.id)}>
                                {t.label}
                            </button>
                        ))}
                    </div>

                    <div className="content">
                        {error && <div className="error">⚠ {error}</div>}
                        {page === "dashboard" && <PageDashboard traffic={traffic} blocked={blocked} agent={agentData} onUnblock={handleUnblock} />}
                        {page === "traffic" && <PageTraffic packets={traffic.packets || []} />}
                        {page === "agent" && <PageAgent agent={agentData} ruleHistory={ruleHistory} onReset={handleReset} />}
                        {page === "logs" && <PageLogs logs={logs} />}
                        {page === "control" && <PageControl onRefresh={fetchAll} rlMode={rlMode} onRlToggle={toggleRL} />}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
